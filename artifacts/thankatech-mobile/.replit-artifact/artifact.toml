kind = "mobile"
previewPath = "/mobile/"
title = "ThankATech Mobile"
version = "1.0.0"
id = "artifacts/thankatech-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22538

[services.development]
run = "pnpm --filter @workspace/thankatech-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thankatech-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/thankatech-mobile", "run", "serve" ]

[services.env]
PORT = "22538"
BASE_PATH = "/mobile/"
