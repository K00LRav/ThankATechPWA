kind = "web"
previewPath = "/"
title = "ThankATech"
version = "1.0.0"
id = "artifacts/thankatech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19816

[services.development]
run = "pnpm --filter @workspace/thankatech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thankatech", "run", "build" ]
publicDir = "artifacts/thankatech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19816"
BASE_PATH = "/"
