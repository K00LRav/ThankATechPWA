<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#e8541f"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1350" cy="-60" r="260" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1420" cy="420" r="180" fill="rgba(255,255,255,0.05)"/>
  <circle cx="80" cy="520" r="220" fill="rgba(0,0,0,0.06)"/>
  <circle cx="-30" cy="80" r="140" fill="rgba(255,255,255,0.05)"/>

  <!-- Logo circle -->
  <circle cx="240" cy="250" r="110" fill="rgba(255,255,255,0.18)"/>
  <circle cx="240" cy="250" r="95" fill="rgba(255,255,255,0.22)"/>

  <!-- Heart icon (centred in circle) -->
  <g transform="translate(240,250)">
    <!-- Lucide-style heart path, scaled to ~70px -->
    <path d="M0 26 C0 26 -42 4 -42 -16 C-42 -33 -28 -44 -14 -44 C-6 -44 0 -38 0 -38 C0 -38 6 -44 14 -44 C28 -44 42 -33 42 -16 C42 4 0 26 0 26 Z"
          fill="white" opacity="0.95"/>
  </g>

  <!-- ThankATech wordmark -->
  <text x="390" y="224" font-family="Georgia, 'Times New Roman', serif" font-size="112" font-weight="700" fill="white" letter-spacing="-3" opacity="0.97">ThankATech</text>

  <!-- Tagline -->
  <text x="394" y="296" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="400" fill="rgba(255,255,255,0.88)" letter-spacing="1.5">Real thanks. Real tips. No ratings.</text>

  <!-- Bottom accent line -->
  <rect x="394" y="338" width="120" height="4" rx="2" fill="rgba(255,255,255,0.45)"/>

  <!-- Website -->
  <text x="394" y="406" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.65)" letter-spacing="0.5">www.thankatech.com</text>
</svg>
