openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ThankATech API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: technicians
    description: Technician operations
  - name: jobs
    description: Job operations
  - name: thanks
    description: Thank message operations
  - name: points
    description: ThankYou Points operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: profile
    description: User profile operations
  - name: stripe
    description: Stripe payment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /technicians:
    get:
      operationId: listTechnicians
      tags: [technicians]
      summary: List/search technicians
      parameters:
        - in: query
          name: specialty
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of technicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"
    post:
      operationId: createTechnician
      tags: [technicians]
      summary: Create technician profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TechnicianInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"

  /technicians/{id}:
    get:
      operationId: getTechnician
      tags: [technicians]
      summary: Get technician by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Technician
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
        "404":
          description: Not found

  /technicians/{id}/wall-of-thanks:
    get:
      operationId: getTechnicianWallOfThanks
      tags: [technicians]
      summary: Get technician's wall of thanks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of thank messages for technician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThankMessage"

  /technicians/{id}/stats:
    get:
      operationId: getTechnicianStats
      tags: [technicians]
      summary: Get technician stats summary
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianStats"

  /technicians/{id}/earnings:
    get:
      operationId: getTechnicianEarnings
      tags: [technicians]
      summary: Get technician earnings breakdown from completed tips
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Earnings breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianEarnings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Technician not found

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      parameters:
        - in: query
          name: customerId
          schema:
            type: integer
        - in: query
          name: technicianId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update job status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /thanks:
    get:
      operationId: listThankMessages
      tags: [thanks]
      summary: List thank messages
      parameters:
        - in: query
          name: technicianId
          schema:
            type: integer
        - in: query
          name: customerId
          schema:
            type: integer
      responses:
        "200":
          description: List of thank messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThankMessage"
    post:
      operationId: createThankMessage
      tags: [thanks]
      summary: Send a thank you message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThankMessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThankMessage"

  /thanks/recent:
    get:
      operationId: getRecentThanks
      tags: [thanks]
      summary: Get recent thank messages across the platform
      responses:
        "200":
          description: Recent thanks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThankMessage"

  /points/{userId}:
    get:
      operationId: getPoints
      tags: [points]
      summary: Get user points balance
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Points balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsBalance"

  /points/{userId}/transactions:
    get:
      operationId: getPointTransactions
      tags: [points]
      summary: Get points transaction history
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PointTransaction"

  /points/{userId}/redeem:
    post:
      operationId: redeemPoints
      tags: [points]
      summary: Redeem points for a reward
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemPointsInput"
      responses:
        "200":
          description: Redemption successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionResult"
        "400":
          description: Insufficient points or invalid reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /points/rewards:
    get:
      operationId: listRewards
      tags: [points]
      summary: List available redemption rewards
      responses:
        "200":
          description: Available rewards catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reward"

  /platform/stats:
    get:
      operationId: getPlatformStats
      tags: [health]
      summary: Get overall platform stats
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /stripe/config:
    get:
      operationId: getStripeConfig
      tags: [stripe]
      summary: Get Stripe publishable key
      responses:
        "200":
          description: Stripe config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConfig"
        "503":
          description: Stripe not configured

  /stripe/connect/onboard:
    post:
      operationId: createStripeConnectOnboarding
      tags: [stripe]
      summary: Create Stripe Connect account and return onboarding URL
      responses:
        "200":
          description: Onboarding URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeOnboardingUrl"
        "401":
          description: Unauthorized
        "404":
          description: Technician profile not found

  /stripe/connect/status:
    get:
      operationId: getStripeConnectStatus
      tags: [stripe]
      summary: Check if current technician has a connected Stripe account
      responses:
        "200":
          description: Stripe Connect status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectStatus"
        "401":
          description: Unauthorized

  /thanks/{id}:
    get:
      operationId: getThankMessage
      tags: [thanks]
      summary: Get a single thank message by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Thank message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThankMessage"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /stripe/retry-payment:
    post:
      operationId: retryStripePayment
      tags: [stripe]
      summary: Create a new PaymentIntent to retry a failed tip payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeRetryPaymentInput"
      responses:
        "200":
          description: New payment intent created for retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentIntentResult"
        "400":
          description: Invalid input or payment not in failed state
        "401":
          description: Unauthorized
        "402":
          description: Technician has not completed Stripe Connect onboarding
        "403":
          description: Forbidden
        "404":
          description: Thank message not found

  /stripe/payment-intent:
    post:
      operationId: createStripePaymentIntent
      tags: [stripe]
      summary: Create a Stripe PaymentIntent for a tip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripePaymentIntentInput"
      responses:
        "200":
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentIntentResult"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /stripe/connect/dashboard-link:
    get:
      operationId: getStripeConnectDashboardLink
      tags: [stripe]
      summary: Get a Stripe Express dashboard login link for the authenticated technician
      responses:
        "200":
          description: Dashboard login URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeDashboardLink"
        "401":
          description: Unauthorized
        "402":
          description: Stripe onboarding not complete
        "404":
          description: Technician profile not found

  /stripe/earnings:
    get:
      operationId: getStripeEarnings
      tags: [stripe]
      summary: Get the authenticated technician's tip earnings and payout history
      responses:
        "200":
          description: Earnings summary and history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeEarnings"
        "401":
          description: Unauthorized
        "404":
          description: Technician profile not found

  /stripe/payment-complete:
    post:
      operationId: recordStripePaymentComplete
      tags: [stripe]
      summary: Record that a Stripe payment was completed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripePaymentCompleteInput"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePaymentCompleteResult"
        "401":
          description: Unauthorized

  /profile/me:
    get:
      tags: [profile]
      operationId: getMyProfile
      summary: Get the current user's profile
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Current user's profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyProfileEnvelope'
        '401':
          description: Unauthorized
    post:
      tags: [profile]
      operationId: upsertMyProfile
      summary: Create or update the current user's profile (set user type)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProfileInput'
      responses:
        '200':
          description: Profile created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyProfile'
        '401':
          description: Unauthorized

  /push-tokens:
    post:
      tags: [profile]
      operationId: registerPushToken
      summary: Register an Expo push notification token for the current user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushTokenInput'
      responses:
        '200':
          description: Token registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushTokenResult'
        '401':
          description: Unauthorized
    delete:
      tags: [profile]
      operationId: unregisterPushToken
      summary: Remove an Expo push notification token for the current user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushTokenInput'
      responses:
        '200':
          description: Token removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushTokenResult'
        '401':
          description: Unauthorized

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Technician:
      type: object
      required: [id, fullName, specialty, serviceArea, bio, totalThanks, totalEarned, avatarUrl]
      properties:
        id:
          type: integer
        fullName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        specialty:
          type: string
        specialties:
          type: array
          items:
            type: string
        serviceArea:
          type: string
        bio:
          type: string
        hourlyRate:
          type: ["number", "null"]
        certifications:
          type: array
          items:
            type: string
        totalThanks:
          type: integer
        totalEarned:
          type: number
        createdAt:
          type: string

    TechnicianInput:
      type: object
      required: [fullName, specialty, serviceArea, bio]
      properties:
        fullName:
          type: string
        avatarUrl:
          type: string
        specialty:
          type: string
        specialties:
          type: array
          items:
            type: string
        serviceArea:
          type: string
        bio:
          type: string
        hourlyRate:
          type: number
        certifications:
          type: array
          items:
            type: string

    TechnicianStats:
      type: object
      required: [technicianId, totalThanks, totalTips, totalEarned, totalJobs, avgTipAmount]
      properties:
        technicianId:
          type: integer
        totalThanks:
          type: integer
        totalTips:
          type: integer
        totalEarned:
          type: number
        totalJobs:
          type: integer
        avgTipAmount:
          type: number

    Job:
      type: object
      required: [id, customerId, technicianId, title, status, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        technicianId:
          type: integer
        technicianName:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        scheduledDate:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]

    JobInput:
      type: object
      required: [customerId, technicianId, title]
      properties:
        customerId:
          type: integer
        technicianId:
          type: integer
        title:
          type: string
        description:
          type: string
        address:
          type: string
        scheduledDate:
          type: string

    JobUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, declined, completed, cancelled]
        completedAt:
          type: string

    ThankMessage:
      type: object
      required: [id, jobId, customerId, technicianId, message, tipAmount, paymentStatus, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        technicianId:
          type: integer
        technicianName:
          type: string
        technicianAvatar:
          type: ["string", "null"]
        message:
          type: string
        tipAmount:
          type: number
        paymentStatus:
          type: string
          description: Payment status of the tip (none, pending, succeeded, failed)
        photoUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    ThankMessageInput:
      type: object
      required: [jobId, customerId, technicianId, message]
      properties:
        jobId:
          type: integer
        customerId:
          type: integer
        technicianId:
          type: integer
        message:
          type: string
        tipAmount:
          type: number
        photoUrl:
          type: string

    PointsBalance:
      type: object
      required: [userId, balance]
      properties:
        userId:
          type: integer
        balance:
          type: integer
        updatedAt:
          type: string

    PointTransaction:
      type: object
      required: [id, userId, amount, type, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: integer
        type:
          type: string
        jobId:
          type: ["integer", "null"]
        description:
          type: string
        createdAt:
          type: string

    Reward:
      type: object
      required: [id, name, description, cost, category]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cost:
          type: integer
        category:
          type: string
          description: "all, customer, technician"

    RedeemPointsInput:
      type: object
      required: [rewardId]
      properties:
        rewardId:
          type: string

    RedemptionResult:
      type: object
      required: [success, newBalance, reward]
      properties:
        success:
          type: boolean
        newBalance:
          type: integer
        reward:
          $ref: "#/components/schemas/Reward"

    PlatformStats:
      type: object
      required: [totalTechnicians, totalThanks, totalTipsAmount, totalJobs]
      properties:
        totalTechnicians:
          type: integer
        totalThanks:
          type: integer
        totalTipsAmount:
          type: number
        totalJobs:
          type: integer

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
